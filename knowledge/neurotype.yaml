          url: https://www.cdc.gov/adhd/about/adhd-in-adults.html
          type: clinical
        - title: "Persistence of parent-reported ADHD symptoms from childhood through adolescence — CDC"
          url: https://archive.cdc.gov/www_cdc_gov/ncbddd/adhd/features/community-sample.html
          type: clinical
