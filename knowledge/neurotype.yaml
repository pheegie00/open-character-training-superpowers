  - id: anxiety
    summary: >
      From the inside, childhood anxiety is a body problem as much as a mind problem — a
      stomach that hurts every school morning, a heart that races before the spelling
      test, a brain that generates "what if" disasters on loop. Young children usually
      cannot name the feeling as worry; they just know their tummy hurts, they can't
      sleep, and everything feels safer if Mom stays. Anxiety is the most common mental
      health condition in children and one of the most treatable.
    trait_repertoire:
      - trait: somatic complaints
        description: >
          Stomachaches, headaches, nausea, dizziness, fatigue — real physical pain with
          an emotional engine, classically worse on school mornings and gone by Saturday.
          The child is not faking; the body is where a child's anxiety talks.
        variation: >
          The dominant presentation in younger kids and in families or cultures where
          feelings aren't discussed; some anxious kids have zero somatic symptoms and
          are pure worriers.
      - trait: avoidance
        description: >
          The signature behavior — refusing sleepovers, dodging class presentations,
          school refusal, quitting the team. Each avoidance brings instant relief and
          feeds the anxiety long-term, which is why accommodation by loving adults can
          accidentally grow the problem.
        variation: >
          Ranges from subtle (always "forgetting" gym clothes) to total (missed months
          of school); the feared thing varies by subtype — separation, social judgment,
          specific phobia, or everything (generalized).
      - trait: reassurance seeking
        description: >
          Asking the same "but what if" question dozens of times ("You'll pick me up,
          right? But what if you're late?"), needing repeated confirmation that no one is
          sick, mad, or leaving. The relief from each answer lasts minutes.
        variation: >
          Very common in generalized and separation anxiety; socially anxious kids may
          instead go quiet and never ask anything.
      - trait: irritability and anger
        description: >
          Cornered-animal behavior — snapping, storming, raging at homework, exploding
          when pushed toward a feared thing. Anxiety in children frequently wears an
          anger costume, and gets punished as defiance.
        variation: >
          More common in boys and in kids without emotion vocabulary; the tell is that
          the "defiance" clusters around specific triggers.
      - trait: perfectionism
        description: >
          Erasing holes through the paper, redoing work, tears over an A-minus, refusing
          to start what can't be done perfectly (procrastination as fear). The engine is
          catastrophic overestimation of what a mistake means.
        variation: >
          The high-achieving anxious kid is often invisible because symptoms look like
          virtue; teachers describe them as "a joy" while the child unravels at home.
      - trait: sleep disruption
        description: >
          The worry brain switches on in the dark — bedtime stalling, needing a parent
          present, nightmares, middle-of-the-night migrations to parents' beds long past
          the typical age.
        variation: >
          Nearly universal in anxious kids in some form; content of night fears is
          age-typical (monsters young, social replay and dread in teens).
      - trait: clinging and separation distress
        description: >
          Shadowing a parent room to room, panic at drop-off, refusing babysitters,
          fear that something terrible will happen to the parent while apart.
          Developmentally normal in toddlers; a disorder when intensity and age don't match.
        variation: >
          Peak presentation in preschool-elementary; in teens it can look like constant
          texting-for-contact instead of physical clinging.
      - trait: social scanning and silence
        description: >
          Watching before joining, rehearsing sentences before speaking, dreading being
          looked at, hating recorded voice or photos. In its strongest childhood form,
          selective mutism — speaking freely at home and not one word at school.
        variation: >
          Distinct from autistic social difference — the socially anxious child usually
          reads cues fine and fears judgment; some kids are anxious AND autistic, which
          compounds.
      - trait: rigid safety behaviors
        description: >
          Lucky objects, fixed routines, sitting near exits, only eating "safe" foods,
          needing to know every detail of the plan in advance. Control is the antidote
          the child invents for unpredictability.
        variation: >
          Overlaps visually with OCD and autistic routine-need; the function (dread
          management) is the differentiator, and only intensity separates quirk from disorder.
      - trait: panic
        description: >
          Sudden waves of racing heart, breathlessness, chest pain, trembling, and doom —
          often misread by the child and family as a medical emergency. More typical of
          older children and teens.
        variation: >
          Many anxious kids never panic; those who do may then develop fear-of-the-fear,
          avoiding wherever the last attack happened.
    by_age:
      preschool:
        - Almost entirely body and behavior — clinging, crying at separation, stomachaches, sleep battles, fear of dogs/dark/monsters/loud noises; the child cannot say "I'm anxious."
        - Regression under stress is common — baby talk, toileting accidents, thumb-sucking returning after a move or new sibling.
        - Watch for the freeze response — the preschooler who goes silent and still in new settings rather than crying.
      elementary:
        - Worry gets verbal and specific — grades, tornadoes, burglars, a parent dying; reassurance-seeking loops and perfectionism appear alongside continuing somatic complaints (the school nurse's frequent flyer).
        - School refusal becomes the highest-stakes battleground; Sunday-night dread and Monday-morning stomachaches form a legible weekly rhythm.
        - Kids this age start hiding worry out of embarrassment — parents often learn the extent of it only at bedtime confessionals.
      teen:
        - Social anxiety surges — fear of humiliation, avoiding presentations, eating in public, or posting; friend-group dynamics and being perceived become the dominant fear content.
        - Panic attacks emerge; teens self-manage in hidden ways ranging from skipped classes and canceled plans to substance use.
        - Overload from academic stakes plus social media plus sleep debt makes teen anxiety look like irritability, procrastination, or "laziness" from outside.
    co_occurrence:
      - depression (especially in teens; anxiety typically comes first developmentally)
      - ADHD and autism (anxiety is the most common co-occurring condition for both)
      - somatic symptom presentations, recurrent abdominal pain
      - OCD and tic disorders; eating disorders in adolescents
      - sleep disorders
    portrayal:
      do:
        - Dramatize the body — show the stomachache and the racing heart, not just fretful dialogue; for kids that IS the anxiety.
        - Show the logic from inside — the audience should feel why avoiding feels rational and how relief-now feeds fear-later.
        - Let coping be learnable and imperfect — a breathing trick that helps some, a brave attempt that half-works; competence grows in increments.
        - Show help-seeking as strength, and adults responding well when told.
        - Keep the anxious kid a full character with humor, opinions, and courage in other domains — anxious is not the same as weak or fragile.
        - Show that gentle exposure (doing the scary thing with support) works better than either forcing or total protection — this is also the evidence-based treatment story.
      avoid:
        - Playing the anxious kid purely for laughs (the neurotic scaredy-cat sidekick whose fear is the whole joke).
        - Instant cures — one pep talk or one brave moment dissolving an anxiety disorder.
        - Framing accommodation-forever as love's happy ending, or framing "just face it" bootstrapping as the fix.
        - Making the anxiety inexplicable or random; give it internal logic without needing a single traumatic origin scene.
        - Conflating shyness with anxiety disorder — quiet, introverted kids are not automatically disordered.
        - Depicting panic attacks inaccurately as fainting-and-hospital melodrama.
    strengths:
        - conscientiousness, preparation, and reliability
        - keen observation and threat-spotting that reads as perceptiveness
        - deep empathy for others' distress; anxious kids often comfort well
        - vivid imagination (the same machinery that generates what-ifs powers stories)
        - real, visible courage — an anxious kid doing the scary thing is braver than a fearless one doing it
    contested:
        - "Accommodation: families and clinicians disagree in practice about how much to accommodate (letting the child skip, sleep in parents' bed); evidence-based programs (e.g., SPACE) coach reducing accommodation supportively, which some parents experience as harsh."
        - "Medication for pediatric anxiety (SSRIs) is evidence-supported and still stigmatized; therapy-first vs combined-treatment debates are live in families."
        - "Overdiagnosis discourse: some argue normal childhood fear is being pathologized ('anxiety generation'), while clinicians point to genuinely rising prevalence and long waits for care; both views appear in good faith."
    sources:
        - title: "Anxiety and depression in children — CDC"
          url: https://www.cdc.gov/children-mental-health/about/about-anxiety-and-depression-in-children.html
          type: clinical
        - title: "Anxious stomachaches and headaches — Child Mind Institute"
          url: https://childmind.org/article/anxious-stomach-aches-and-headaches/
          type: clinical
        - title: "Somatic complaints in anxious youth"
          url: https://pmc.ncbi.nlm.nih.gov/articles/PMC3989467/
          type: academic
        - title: "What does childhood anxiety look like? Probably not what you think — CHC"
          url: https://www.chconline.org/resourcelibrary/what-does-childhood-anxiety-look-like-probably-not-what-you-think/
          type: clinical

  - id: depression
    summary: >
      From the inside, childhood depression often isn't sadness — it's irritability,
      boredom that swallows everything, and a gray filter over things that used to be
      fun. Kids describe being tired all the time, hating themselves for reasons they
      can't explain, and snapping at people they love. Because it wears an "attitude
      problem" costume, depressed children are routinely mislabeled lazy, difficult, or
      dramatic — and real childhood depression exists even in preschoolers, though it is
      rare before puberty and rises sharply after it.
    trait_repertoire:
      - trait: irritability as the mood
        description: >
          The child version of depressed mood is often cranky, touchy, and angry rather
          than tearful — DSM criteria explicitly allow irritable mood in place of sad
          mood for children and adolescents. Door-slamming and constant conflict can be
          the visible surface of despair.
        variation: >
          Some kids do present with classic visible sadness and crying; many alternate.
          Irritability-forward presentations are most likely to be misread as defiance.
      - trait: anhedonia
        description: >
          The reliable core sign — things that used to light the child up (the team, the
          game, the best friend, dessert) stop being fun. "Bored" and "I don't care"
          become default answers; quitting activities without replacing them.
        variation: >
          May be total or patchy — a teen may still game for hours (numbing, not joy)
          while dropping everything social; loss of pleasure can hide inside "growing
          out of" things too fast.
      - trait: somatic complaints
        description: >
          Especially in younger children — stomachaches, headaches, vague pain, frequent
          nurse visits — because a young child lacks the vocabulary and self-observation
          to report mood.
        variation: >
          Overlaps heavily with anxiety presentation; in depression the complaints
          come with flatness and withdrawal rather than fear.
      - trait: fatigue and slowing
        description: >
          Exhaustion no sleep fixes, heavy limbs, slowed speech and movement, or the
          opposite — restless agitation. Mornings can be the worst; getting out of bed
          becomes a genuine daily battle.
        variation: >
          Teens may sleep 12 hours and stay tired (hypersomnia) or lie awake at 3am;
          either direction of sleep change counts.
      - trait: self-criticism and guilt
        description: >
          A running inner narration of "I'm stupid, I ruin everything, they'd be better
          off without me." Depressed kids over-claim blame for family stress, divorce,
          or team losses, and dismiss praise as pity or error.
        variation: >
          Verbal kids may say these things out loud (take it seriously); others show it
          only as destroying their own artwork or refusing to try.
      - trait: withdrawal
        description: >
          Retreating from friends, family dinners, group chats; the bedroom becomes a
          cave. Withdrawal from FRIENDS is a bigger red flag than withdrawal from family,
          which is developmentally normal for teens.
        variation: >
          Some depressed kids maintain a full social calendar as performance and
          collapse privately — high-functioning presentation is real in teens.
      - trait: academic slide
        description: >
          Concentration and decision-making fog out; grades drop, homework goes missing,
          reading the same page five times. Often the first thing adults notice, and
          often attributed to laziness or phones.
        variation: >
          Perfectionist kids may hold grades steady at enormous invisible cost until a
          sudden collapse.
      - trait: appetite and weight changes
        description: >
          Eating much less or much more; in children, failure to make expected weight
          gains counts. Food loses taste, or becomes comfort.
        variation: >
          Direction varies by kid; entangled with eating-disorder risk in adolescents.
      - trait: sensitivity to rejection and conflict
        description: >
          Small slights confirm the inner verdict ("see, everyone hates me"); friendship
          wobbles trigger disproportionate despair. Interpersonal loss is a common
          precipitant of depressive episodes in youth.
        variation: >
          Interacts with ADHD rejection sensitivity and with bullying, which is both
          cause and consequence of withdrawal.
      - trait: hopelessness about the future
        description: >
          The distinguishing teen feature — inability to imagine things improving, loss
          of interest in plans, "what's the point" reasoning. In younger children this
          appears as themes of death or worthlessness in play and drawings.
        variation: >
          Hopelessness is the highest-alarm trait and the one adults should never write
          off as teen dramatics.
      - trait: risk-taking and numbing
        description: >
          Teen depression can look reckless rather than sad — substances, unsafe
          situations, rage, self-harm as feeling-regulation. Especially in boys, acting
          out replaces speaking out.
        variation: >
          Self-harm is distinct from suicidality though correlated; portray both with
          extreme care (see portrayal rules) or keep offscreen.
    by_age:
      preschool:
        - Rare but documented (validated research by Luby and colleagues) — looks like joylessness in play, excessive guilt in games, irritability, somatic complaints, and regression rather than stated sadness.
        - Play themes carry the content — death, punishment, and "bad" characters recurring in pretend play.
        - Almost always entangled with environment (loss, disruption, caregiver depression); a preschool storyline should center caregiving context.
      elementary:
        - Irritable-plus-somatic presentation dominates — the kid who is always in trouble, always at the nurse, and no fun anymore; school refusal and friend loss follow.
        - The child may say alarming things plainly ("I wish I wasn't here," "I'm the worst kid") without adult-style filtering — kids this age can and do have suicidal thoughts, and disclosures must be taken seriously in-story.
        - Watch for the quiet version too — the well-behaved kid who fades, stops raising a hand, and slips through unnoticed.
      teen:
        - Prevalence jumps sharply with puberty, roughly doubling in girls versus boys; presentation adds hopelessness, self-loathing, sleep-all-day fatigue, and withdrawal from friends.
        - Masks are common — "I'm fine," humor, achievement, or anger; friends usually know before adults do, which is a storytelling opportunity (peer notices, tells trusted adult, that works).
        - Recovery is realistic and typical with support — therapy, sometimes medication, time, reconnection; depicting treatment as normal and effective is both accurate and protective.
    co_occurrence:
      - anxiety disorders (the most common partner, often preceding depression)
      - ADHD (demoralization from years of negative feedback is a known pathway)
      - autism (depression risk rises in masked, excluded autistic teens)
      - substance use in adolescents; eating disorders (especially girls)
      - trauma, loss, bullying, and family conflict as context rather than co-diagnosis
    portrayal:
      do:
        - Show irritability and boredom as the face of child depression, and let another character (or the audience) gradually decode it — that decoding is the accurate arc.
        - Show help-seeking working — telling a friend, parent, counselor, or crisis line leads to real support; per national entertainment guidelines this is the single most protective story choice.
        - Portray recovery as gradual and non-linear (good days returning slowly) rather than a single cathartic cure scene.
        - Keep the character's identity bigger than the diagnosis — talents, humor, and relationships persist through the gray filter and are part of the way back.
        - If suicidal ideation appears, follow safe-messaging guidance — show the character being asked directly and honestly, show adults responding calmly and competently, and include a real resource (in the US, the 988 Suicide & Crisis Lifeline) where the medium allows.
        - Consult mental-health messaging experts and people with lived experience for any storyline touching self-harm or suicide.
      avoid:
        - Any depiction or description of suicide method or means — this is the firmest line in every media guideline (Samaritans, Action Alliance, AFSP); do not show method, means acquisition, or a death scene.
        - Presenting suicide or self-harm as a solution, as romantic, as effective revenge, or as the thing that finally makes others care ("13 Reasons Why" is the canonical cautionary example).
        - Simplistic single-cause explanations (one breakup, one bad grade); depression is multi-causal and usually builds.
        - The "snap out of it" arc — love, a makeover, or one great day curing depression.
        - Equating depression with weakness, or making the depressed kid solely a burden that exhausts the protagonist.
        - Using "committed suicide" framing or treating disclosure as betrayal; model "died by suicide" language and show that telling an adult is loyalty, not snitching.
    strengths:
        - depth, self-awareness, and emotional insight beyond their years once they have language for it
        - profound empathy for others who are struggling; often the friend others confide in
        - creativity — many kids channel the gray filter into art, music, and writing
        - resilience and hard-won coping wisdom after recovery; survived-it perspective
        - honesty about hard things that cuts through social pretense
    contested:
        - "Medication for youth (SSRIs): evidence-supported and carries an FDA boxed warning discussion; families genuinely split, and both 'pills as poison' and 'pills as panacea' portrayals will misfire with some audience."
        - "Overdiagnosis vs crisis framing: 'social media made teens sad' discourse is contested; researchers disagree about causation while agreeing prevalence rose. Avoid making one hot-take theory the story's thesis."
        - "'High-functioning depression' and self-diagnosis language via TikTok are embraced by teens and criticized by clinicians; a teen character using such language is realistic either way."
        - "Whether preschool depression should be diagnosed at all remains debated in clinical circles despite validation research."
