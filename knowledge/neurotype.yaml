dimension: neurotype
version: 0.1.0
scope: >
  How autism, ADHD, anxiety, and depression actually manifest in children ages 0-17,
  as ranges of traits for grounding character bibles.
design_rule: >
  Every condition is a REPERTOIRE, not a checklist. A real child expresses a specific
  small subset of these traits. "If you've met one autistic person, you've met one
  autistic person." Demographics and diagnoses determine a character's circumstances,
  never their personality.

conditions:
  - id: autism
    summary: >
      From the inside, autism is a different sensory and social operating system, not a
      set of deficits. The world is often too loud, too bright, too fast, and too
      unspoken-rule-bound; deep focus, honesty, pattern-love, and rhythmic movement feel
      natural and good. Much of the visible "difficulty" is the friction of translating
      constantly for a world built for other nervous systems, which is exhausting even
      when it looks effortless.
    trait_repertoire:
      - trait: motor stimming
        description: >
          Repetitive movement that regulates the senses and expresses feeling, such as
          hand-flapping, spinning, rocking, bouncing, toe-walking, finger-flicking, or
          pacing. Autistic adults describe stimming as pleasurable and necessary, "like
          holding back something you need to say" when suppressed. Flapping often spikes
          with joy or excitement, not only distress.
        variation: >
          Repertoires are individual. One child flaps, another only rocks, another paces
          in circles while thinking. Many autistic kids have no visible stims at all, or
          only tiny ones (jaw clenching, hair-twirling, rubbing a seam) — especially kids
          who have learned to hide them.
      - trait: vocal stimming and echolalia
        description: >
          Humming, repeating satisfying words or sounds, or echoing phrases just heard
          (immediate echolalia) or from days or years ago (delayed echolalia). Echolalia
          is often meaningful communication — a movie line can mean "I'm scared" if it
          came from a scary scene.
        variation: >
          Common in younger and higher-support children; many autistic kids never echo at
          all, and some fluent speakers still quote-to-communicate as teens.
      - trait: scripting
        description: >
          Rehearsing conversations in advance or reusing lines from media and past
          interactions as building blocks for speech. Scripting makes unpredictable
          social situations survivable and can make a child sound oddly formal or
          "little professor"-ish.
        variation: >
          Heaviest in kids who mask; a confident autistic kid in a safe environment may
          barely script. Some children script fluently in special-interest topics and
          go near-nonverbal outside them.
      - trait: special interests
        description: >
          Deep, joyful, expert-level absorption in specific topics — trains, a video
          game, marine biology, a single band, vacuum cleaners, a historical era. The
          interest is a source of genuine expertise, identity, comfort, and social entry
          point, not an empty obsession.
        variation: >
          Topics range from stereotypically "quirky" to completely ordinary (horses,
          K-pop, a best friend's life) — ordinary-topic interests in girls are routinely
          missed. Some kids serially replace interests; others keep one for a decade.
      - trait: sensory hypersensitivity
        description: >
          Fluorescent lights buzz and flicker painfully, tags and seams burn, cafeteria
          noise physically hurts, certain food textures trigger gagging, unexpected touch
          feels like an attack. The child is not overreacting; the volume knob is
          genuinely set higher.
        variation: >
          Profiles are idiosyncratic — sound-sensitive but touch-seeking, or vice versa.
          Sensitivity fluctuates with stress and sleep; a coping child at 9am may be
          overwhelmed by the same room at 3pm.
      - trait: sensory hyposensitivity and seeking
        description: >
          The opposite pole, often in the same child in different senses. Craving deep
          pressure, tight hugs, crashing into furniture, chewing shirts, not noticing
          cold, pain, hunger, or a full bladder (interoception differences).
        variation: >
          Seeking behavior is often misread as "hyper" or naughty. Poor interoception is
          nearly invisible and often persists in otherwise low-support kids.
      - trait: masking and camouflaging
        description: >
          Consciously performing neurotypicality — forcing eye contact, copying a
          popular peer's laugh and posture, suppressing stims, rehearsing small talk. It
          works, at the cost of exhaustion, delayed diagnosis, lost sense of self, and
          after-school meltdowns once the mask drops at home.
        variation: >
          Most documented in girls and gender-diverse kids ("lost girls" who fly under
          the diagnostic radar into their teens or adulthood), but boys mask too. Some
          children cannot or do not mask at all; unmasked autism is not "more severe,"
          just more visible.
      - trait: meltdown
        description: >
          An involuntary fight-response to overload — crying, screaming, throwing,
          bolting, sometimes self-injury (head-banging, biting own arm). Not a tantrum
          and not manipulation; there is no audience-checking, no goal, and afterwards
          usually exhaustion and shame. Adults escalate it by demanding eye contact,
          touching, or talking.
        variation: >
          Frequency ranges from daily to almost never. Triggers accumulate invisibly
          ("the water bottle was the last straw, not the reason"). Many kids melt down
          only at home, where it is safe — school sees the "fine" version.
      - trait: shutdown
        description: >
          The freeze-response twin of the meltdown — going silent and still, losing
          speech, hiding under a desk or blanket, unresponsive to questions. The same
          overload turned inward. Often praised as "calming down" when the child is
          actually offline.
        variation: >
          Some children only shut down and never melt down; these kids get missed
          entirely. Losing speech under stress (situational mutism) happens even to
          normally hyper-verbal autistic kids.
      - trait: social directness and literal processing
        description: >
          Saying true things at socially wrong times, missing sarcasm or hints, taking
          idioms literally, asking "why?" about rules everyone else absorbs silently.
          From the inside this is honesty and a need for explicit logic, not rudeness.
        variation: >
          Many autistic kids learn irony and sarcasm fine, especially with age; some
          become heavy sarcasm users themselves. Literalism is strongest under stress.
      - trait: eye contact differences
        description: >
          Eye contact can feel invasive, painful, or simply incompatible with listening —
          many autistic people process speech better while looking away. Forced eye
          contact costs comprehension.
        variation: >
          Ranges from total avoidance to trained "look at the eyebrows" workarounds to
          unusually intense staring. Some autistic kids have completely typical gaze.
      - trait: need for sameness and routine
        description: >
          Predictability is safety. Same breakfast, same route, lining up toys, distress
          at substitute teachers or moved furniture, needing warnings before transitions.
          Rituals are load-bearing, not arbitrary.
        variation: >
          Intensity varies hugely; some kids are flexible about everything except one or
          two sacred routines. Distress at change often reads as "brattiness" to adults.
      - trait: uneven skill profile
        description: >
          Reading at 3 but unable to tie shoes at 9; encyclopedic dinosaur knowledge but
          can't order food; solving math above grade level while needing help dressing.
          Spiky profiles are the norm, in every direction.
        variation: >
          Includes nonspeaking kids with rich inner lives and strong receptive language —
          not speaking is not not-thinking. About a third of autistic kids also have
          intellectual disability; most do not.
      - trait: co-regulation with objects and animals
        description: >
          Comfort objects carried far past typical age, intense bonds with pets, deep
          attachment to specific textures or fidgets. A specific rock or worn plush can
          be a portable anchor.
        variation: >
          Nearly universal in some form but the form is personal; many teens shift to
          headphones-and-hoodie as socially camouflaged regulation gear.
    by_age:
      preschool:
        - Differences often visible by age 2-3 — absent or unusual pointing and showing, language that is delayed OR precociously advanced, lining up toys, big reactions to sensory events, not orienting to name.
        - Play may be object-focused (wheels, sorting, spinning) rather than pretend-social; parallel play persists longer. Some preschoolers script entire TV episodes verbatim.
        - Meltdowns look superficially like toddler tantrums, which is why parents are told "all kids do that"; the tell is triggers (sensory, transition) and intensity/duration, not "wanting something."
      elementary:
        - The social gap widens as peer play becomes rule-laden and verbal — recess and lunch are often the hardest parts of school, not academics. The child may prefer adults or much younger kids.
        - Special interests become visible expertise; the child may monologue and miss that listeners left. Masking often begins here, especially in girls, who imitate a chosen "social template" friend.
        - After-school restraint collapse is classic — perfect at school, meltdown at home. Teachers and parents may describe two different children.
      teen:
        - Masking peaks and its costs surface — anxiety, exhaustion, identity confusion, autistic burnout (skill loss and shutdown after years of camouflaging). Late diagnosis in this window is common, especially for girls.
        - Social rules get exponentially harder (flirting, group chats, implied hierarchies); many autistic teens find their people through interest-based communities, often online, where text-based socializing removes the hardest channels.
        - Some teens grow into their autistic identity with pride and self-advocacy; others double down on hiding. Both arcs are real and can coexist in one kid across contexts.
    co_occurrence:
      - ADHD (very common; "AuDHD" is a widely used community identity)
      - anxiety disorders (the most common co-occurring mental health condition)
      - sensory and gastrointestinal issues, sleep problems
      - epilepsy, intellectual disability (in a minority), dyspraxia
      - depression in teens, often linked to masking and exclusion rather than autism itself
      - gender diversity is notably more common among autistic youth
    portrayal:
      do:
        - Show interiority — narrate from inside the sensory flood and the logic of the routine, so the audience experiences the reason before the behavior.
        - Give the autistic kid competence, humor, and a real arc where they want things and act; autism is the character's operating system, not their plot function.
        - Show stimming as neutral-to-joyful body language (happy flapping!) that other characters simply accept, not as a symptom to be trained away.
        - Cast and consult autistic people; autistic writers and actors catch false notes no checklist catches.
        - Vary who is autistic — girls, Black and brown kids, chatty kids, sporty kids; the diagnosed-white-boy default erases most of the actual population.
        - Let the child have their own opinion about being autistic — proud, annoyed, indifferent, evolving — rather than making it only the parents' journey.
      avoid:
        - The savant cliché (human calculator, Rain Man) — savant skills are rare and the trope replaces personality with a party trick.
        - Autism as burden narrative told entirely from exhausted-parent point of view, where the child is a problem to be solved or mourned.
        - The emotionless-robot read — autistic kids typically feel intensely, often hyper-empathically; what differs is expression and processing speed.
        - Meltdown-as-spectacle used for drama, or a meltdown "cured" by a hug from the right person.
        - Curing, or "overcoming," autism as the happy ending; acceptance and accommodation are the endings the community asks for.
        - One character carrying the whole spectrum — a single set of dramatic visible traits standing in for all autism.
    strengths:
        - deep sustained focus and genuine expertise in areas of interest
        - honesty, loyalty, and low interest in social games or status
        - pattern recognition, systemizing, and attention to detail
        - strong sense of justice and fairness, often fierce about rules protecting others
        - original, non-conformist thinking; unusual and creative associations
        - intense capacity for joy in specific things (the community calls stims and interests genuine pleasures, not symptoms)
    contested:
        - "Language: surveys consistently find most autistic adults prefer identity-first ('autistic person') and many find person-first ('person with autism') stigmatizing; ASAN and most self-advocates use identity-first, while many clinicians and some parents insist on person-first. A minority of autistic people do prefer person-first — a character or family can sit anywhere on this."
        - "ABA (applied behavior analysis): mainstream clinical bodies endorse it; a large portion of the autistic adult community describes compliance-focused ABA as harmful and masking-training. Portraying therapy uncritically as unambiguous good will alienate community viewers."
        - "Functioning labels: 'high-functioning / low-functioning' are rejected by self-advocates as inaccurate (functioning varies by day and domain) and harmful (high = needs dismissed, low = abilities dismissed). Community and DSM-5 usage trends toward support-needs language."
        - "Cure vs acceptance: some parents and researchers pursue cure/prevention; the neurodiversity movement holds autism is a disability AND an identity to accommodate, not eliminate."
        - "Symbols: the puzzle piece and 'light it up blue' are strongly disliked by much of the autistic community; the gold or rainbow infinity symbol is preferred."
