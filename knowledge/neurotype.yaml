  - id: adhd
    summary: >
      From the inside, ADHD is not a lack of attention but a lack of steering — attention
      goes where interest, novelty, challenge, or urgency pull it, and willpower alone
      cannot redirect it. The same brain that loses its third water bottle this month can
      lock onto a fascinating project for six hours straight. Living with it as a kid
      means hearing thousands of corrections ("sit still," "you're not trying," "where's
      your homework") and slowly absorbing the message that you are lazy or broken when
      you are neither.
    trait_repertoire:
      - trait: three presentations, one diagnosis
        description: >
          Hyperactive-impulsive (moving, blurting, climbing), inattentive (quiet,
          dreamy, disorganized, "lost in the fog"), and combined. The inattentive kid —
          disproportionately often a girl — is the one nobody refers for evaluation
          because she isn't disruptive, just "spacey" and underachieving.
        variation: >
          Presentation is a starting point, not a personality; two combined-type kids
          can look nothing alike. Presentation labels can also change over a childhood.
      - trait: presentation shifts with age
        description: >
          The 5-year-old who climbs furniture and narrates everything often becomes the
          15-year-old who looks calm but describes a motor inside that never switches
          off — external hyperactivity converts to internal restlessness, foot-jiggling,
          pen-clicking, and a racing mind at bedtime.
        variation: >
          Inattentive symptoms tend to persist while visible hyperactivity fades; some
          teens stay outwardly bouncy, and some kids were never outwardly hyper at all.
      - trait: hyperfocus
        description: >
          The flip side of distractibility — total, time-erasing absorption in something
          interesting (a game, drawing, a project), hard to enter on command and hard to
          exit; the child genuinely does not hear their name being called. Community
          writers describe it as both superpower and trap.
        variation: >
          Nearly universal in some form, but the objects differ; adults often refuse to
          believe a child "can't have ADHD" because they can focus on Minecraft for hours.
      - trait: time blindness
        description: >
          Time exists in two flavors — "now" and "not now." Five minutes and an hour
          feel the same; deadlines are invisible until they are emergencies; chronic
          lateness happens despite genuine care and effort. Waiting is physically hard.
        variation: >
          Some kids compensate early with alarms and rigid schedules (often anxious
          high-achievers); others are perpetually blindsided by consequences.
      - trait: working memory gaps
        description: >
          Walking upstairs for shoes and returning with a toy and no shoes; losing the
          thread mid-sentence; forgetting the homework that is completed and in the
          backpack. The information isn't refused, it evaporates.
        variation: >
          Severity varies; some kids build elaborate external memory systems (notes on
          hands, stacking objects by the door) surprisingly young.
      - trait: emotional intensity
        description: >
          Feelings arrive at full volume with no dimmer — rage, despair, and delight all
          flash-flood and often pass just as fast. Emotional dysregulation is one of the
          most impairing and least-portrayed parts of childhood ADHD.
        variation: >
          Some kids explode outward (slamming doors, storming off), others implode into
          tears or self-loathing; recovery speed is often startlingly quick, which adults
          misread as the feeling having been fake.
      - trait: rejection sensitivity
        description: >
          Perceived criticism or exclusion lands as physical pain — community language
          calls it rejection sensitive dysphoria. Years of correction prime the child to
          hear "you're bad" inside neutral feedback; a gentle note from a favorite
          teacher can wreck an afternoon. Qualitative research finds withdrawal, masking,
          and bodily distress at its core.
        variation: >
          Ranges from mild wobble to the dominant emotional fact of a kid's life; some
          respond by people-pleasing and perfectionism, others by preemptively rejecting
          everyone first ("I didn't want to be in your group anyway").
      - trait: impulsivity
        description: >
          Acting on the thought as it arrives — blurting answers, interrupting, grabbing,
          risky stunts, saying the unsayable thing. The gap between impulse and action
          that other brains have simply isn't there yet; remorse afterwards is real and
          immediate.
        variation: >
          Fades or internalizes with age for many (becoming impulsive spending or
          blurted texts); inattentive-presentation kids may show almost none.
      - trait: executive chaos
        description: >
          The backpack of doom, the desk avalanche, the twelve unfinished projects.
          Initiating boring tasks feels like pushing a boulder ("I want to do it and I
          physically cannot start"); this is task paralysis, not defiance.
        variation: >
          Some kids are messy everywhere; others keep one domain (their collection,
          their game inventory) in immaculate order because interest powers organization.
      - trait: variability day to day
        description: >
          The defining cruelty — the child who did it perfectly Tuesday cannot do it
          Thursday, so adults conclude effort is the variable. "You did it before" is
          the sentence every ADHD kid learns to dread. Consistency is the impairment.
        variation: >
          Sleep, interest, novelty, and emotional weather all move the needle; some kids
          learn to surf their own variability by their teens, most just get blamed for it.
      - trait: sensory and stimulation seeking
        description: >
          Boredom is aversive to the point of pain; the understimulated ADHD brain
          manufactures stimulation — humming, tipping chairs, poking siblings, daredevil
          play, provoking drama. Background noise or fidgeting can genuinely improve focus.
        variation: >
          Strongest in hyperactive presentations; some inattentive kids seek stimulation
          entirely inside their own heads through elaborate daydream worlds.
      - trait: sleep problems
        description: >
          The brain switches on at bedtime — racing thoughts, revenge bedtime
          procrastination, difficulty waking. Chronic sleep debt then amplifies every
          other symptom next day.
        variation: >
          Very common but not universal; medication timing can help or worsen it.
    by_age:
      preschool:
        - Motor-driven and full-body — running instead of walking, climbing everything, leaving circle time, grabbing toys; diagnosis this early usually requires severity, and hyperactive-presentation boys dominate referrals.
        - Emotional storms are big and fast (rage to sunshine in minutes); transitions and waiting are flashpoints.
        - Inattentive preschoolers are essentially invisible — dreamy, slow to dress, "off with the fairies" — and will not be flagged for years.
      elementary:
        - School demands (sit, wait, finish, remember) collide with the brain head-on; this is the peak diagnosis window. Homework becomes a nightly battlefield of task paralysis and lost worksheets.
        - The correction-avalanche years — the child hears vastly more negative feedback than peers, and self-esteem damage and rejection sensitivity take root ("I'm the bad kid," "I'm stupid").
        - Friendship friction appears — interrupting, rule-breaking in games, missing social cues from inattention; the class clown role is often deliberate reputation management.
      teen:
        - Hyperactivity goes underground into restlessness and risk appetite (speed, substances, impulsive decisions) while organizational demands explode — multiple teachers, long-term projects, no one packing your bag.
        - Missed deadlines and "wasted potential" lectures pile up; bright ADHD teens who coasted early often hit a wall when effort must be self-directed. Masking and exhaustion look like laziness or depression.
        - Emotional intensity plus adolescence is a volatile mix — RSD makes social media brutal; girls especially get diagnosed only now, after anxiety or an eating disorder sends them to a clinician who looks deeper.
    co_occurrence:
      - autism (AuDHD), learning disabilities (dyslexia, dysgraphia, dyscalculia)
      - anxiety and depression (very common by adolescence, often secondary to years of negative feedback)
      - oppositional defiant disorder label (frequently entangled with unrecognized ADHD frustration)
      - sleep disorders; sensory processing differences
      - tics and Tourette syndrome in a minority
    portrayal:
      do:
        - Show the effort — the audience should see the kid trying hard and failing anyway, so variability reads as neurology instead of laziness.
        - Include hyperfocus and creativity, not just distraction; let the ADHD kid be the one who solves the problem via an association nobody else made.
        - Show the inner monologue (racing thoughts, the shame spiral after blurting) so impulsivity has interiority.
        - Portray inattentive-type kids, especially girls — the quiet daydreamer facing the window is the representation gap.
        - Show supports working without being magic — alarms, body-doubling, a teacher who lets the kid stand, medication as one unremarkable tool among several if depicted.
        - Let the character genuinely like parts of their brain; community voices consistently describe both grief and gifts.
      avoid:
        - ADHD as comic relief only — the chaotic funny sidekick whose forgetfulness exists solely for jokes and who has no inner life or pain about it.
        - The "just needs discipline" arc where stricter parenting or trying harder fixes the symptoms.
        - Equating ADHD with stupidity or low ambition; also avoid the opposite "it's a superpower, period" gloss that erases real impairment.
        - Medication as either zombie-maker or magic fix; both extremes misrepresent most kids' experience.
        - Making the ADHD kid always male, always hyperactive, always disruptive.
        - Treating emotional outbursts as pure brattiness with no neurological context and no repair scene afterwards.
    strengths:
        - creativity and divergent association (many ideas, unexpected connections)
        - hyperfocus-powered depth and productivity on chosen work
        - energy, spontaneity, and infectious enthusiasm
        - crisis competence — urgency finally supplies the missing activation, and some ADHD kids are at their calmest and best in genuine emergencies
        - resilience and humor built from surviving constant course-correction
        - strong justice streak and empathy for other kids who get in trouble
    contested:
        - "Superpower framing: some community figures embrace 'ADHD is a superpower'; many others (including clinicians and adults with ADHD) find it toxic-positivity that denies impairment. 'Both gift and disability' is the safest honest ground."
        - "Rejection sensitive dysphoria: hugely resonant community term, not a formal diagnosis; some researchers dispute it as a distinct construct while lived-experience reports are consistent and strong."
        - "Medication: stimulants are first-line, effective, and stigmatized; families genuinely disagree, and 'overmedicated kids' discourse coexists with severe underdiagnosis in girls and children of color."
        - "Naming: 'ADHD' is criticized even inside the community as misnaming an interest-regulation difference as an attention deficit; 'ADHDer' and 'neurospicy' are common informal identity terms some love and some hate."
    sources:
        - title: "How to ADHD (Jessica McCabe) — YouTube channel and book"
          url: https://www.youtube.com/c/HowtoADHD
          type: lived_experience
        - title: "Jessica McCabe interview on ADHD strengths and self-acceptance — ADDitude"
          url: https://www.additudemag.com/how-to-adhd-jessica-mccabe-interview/
          type: lived_experience
